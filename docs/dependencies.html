<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dependencies by Team</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7fa;
            margin: 2em;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
        }
        select {
            margin: 10px auto;
            display: block;
            padding: 10px;
            font-size: 16px;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            background-color: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        th {
            background-color: #3498db;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <h2>Dependencies by Team</h2>
    <label for="teamFilter">Filter by Team:</label>
    <select id="teamFilter" onchange="filterTable()">
        <option value="all">All Teams</option>
    </select>

    <table id="dependencyTable">
        <thead>
            <tr>
                <th>Team</th>
                <th>Issue Key</th>
                <th>Summary</th>
            </tr>
        </thead>
        <tbody>
            <!-- Rows will be injected by JS -->
        </tbody>
    </table>

    <script>
        const dependencies = [
            { team: "Engineering - Product", key: "BGP-101", summary: "Depends on UI refresh" },
            { team: "Engineering - Platform", key: "BGP-102", summary: "Blocked by API limits" },
            { team: "Data Science", key: "BGP-103", summary: "Dependent on data pipeline" },
            { team: "Design", key: "BGP-104", summary: "Waiting for wireframes" },
            { team: "Engineering - AI Ops", key: "BGP-105", summary: "Blocked by ML model approval" },
            { team: "Data Science", key: "BGP-106", summary: "Requires DB schema change" }
        ];

        const tableBody = document.querySelector("#dependencyTable tbody");
        const filterDropdown = document.getElementById("teamFilter");
        const uniqueTeams = [...new Set(dependencies.map(dep => dep.team))];

        uniqueTeams.forEach(team => {
            const option = document.createElement("option");
            option.value = team;
            option.textContent = team;
            filterDropdown.appendChild(option);
        });

        function renderTable(filterTeam = "all") {
            tableBody.innerHTML = "";
            dependencies.forEach(dep => {
                if (filterTeam === "all" || dep.team === filterTeam) {
                    const row = document.createElement("tr");
                    row.innerHTML = `
                        <td>${dep.team}</td>
                        <td>${dep.key}</td>
                        <td>${dep.summary}</td>
                    `;
                    tableBody.appendChild(row);
                }
            });
        }

        function filterTable() {
            const selectedTeam = filterDropdown.value;
            renderTable(selectedTeam);
        }

        renderTable(); // Initialize
    </script>
</body>
</html>
